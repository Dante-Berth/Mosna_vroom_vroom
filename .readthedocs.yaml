# Read the Docs configuration for MOSNA (vroom vroom edition)
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    # Install the package itself so mkdocstrings/Griffe can resolve `mosna`.
    # `docs` extra pulls the MkDocs toolchain.
    - method: pip
      path: .
      extra_requirements:
        - docs
