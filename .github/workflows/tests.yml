name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }} .venv

      - name: Install package (core + dev extras)
        # Optional heavy/GPU backends (scanorama, tysserand, torchgmm, RAPIDS)
        # are import-guarded in mosna._common, so they are NOT needed for tests.
        run: uv pip install -e '.[dev]'

      - name: Import smoke test
        run: |
          source .venv/bin/activate
          python -c "import mosna; print('mosna', mosna.__version__, '| gpu:', mosna.gpu_clustering)"

      - name: Run test suite
        run: |
          source .venv/bin/activate
          pytest -q --maxfail=1

  benchmark-smoke:
    name: benchmark smoke (small, asserts correctness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create virtual environment
        run: uv venv --python 3.11 .venv

      - name: Install package (core + benchmark extras)
        run: uv pip install -e '.[dev,benchmark]'

      - name: I/O benchmark (small)
        run: |
          source .venv/bin/activate
          python benchmarks/bench_io.py --rows 20000 --cols 10 --repeats 2

      - name: Compute benchmark (small, verifies results match original)
        run: |
          source .venv/bin/activate
          python benchmarks/bench_compute.py --cells 20000 --neighbors 6 \
            --attributes 6 --markers 8 --n-shuffle 5 --nas-cells 4000
