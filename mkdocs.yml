site_name: MOSNA (vroom vroom edition) 🏎️
site_description: >-
  Multi-Omics Spatial Network Analysis — accelerated fork. Spatial-omics
  feature extraction, spatial networks, niche statistics and clinical modeling.
site_url: https://dante-berth.github.io/Mosna_vroom_vroom/
repo_url: https://github.com/Dante-Berth/Mosna_vroom_vroom
repo_name: Dante-Berth/Mosna_vroom_vroom
docs_dir: docs
site_dir: site

# Fail the build on broken internal links / nav / anchors — the failures that
# actually break the docs. (Griffe docstring-style nits are logged as warnings
# but don't abort, so we don't run global `--strict`; those are source bugs to
# fix separately, not deploy blockers.)
validation:
  nav:
    omitted_files: warn
  links:
    absolute_links: warn
    unrecognized_links: warn
    not_found: warn

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - MOSNA at a glance: mosna_at_a_glance.md
  - Getting started: getting_started.md
  - Theoretical concepts: theoretical_concepts.md
  - How-to guides: how_to_guides.md
  - Example notebooks:
      - Overview: examples.md
      - CODEX CTCL: notebooks/CODEX_CTCL.ipynb
      - IMC Breast cancer: notebooks/IMC_Breast_cancer.ipynb
      - Visium DLPFC: notebooks/Visium_DLPFC.ipynb
  - API reference: api.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocs-jupyter:
      execute: false          # notebooks render as-is (same as old nbsphinx config)
      include_source: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            merge_init_into_class: true
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://pandas.pydata.org/docs/objects.inv
            - https://scikit-learn.org/stable/objects.inv

extra_javascript:
  # arithmatex (LaTeX math) support
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css
